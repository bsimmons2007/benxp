<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080810" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self';
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src    'self' https://fonts.gstatic.com;
      img-src     'self' data: blob: https://*.supabase.co;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co;
      media-src   'self';
      object-src  'none';
      frame-ancestors 'none';
    " />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YouXP" />
    <title>YouXP</title>

    <!-- Design system fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Boot loader — inline styles allowed by CSP -->
    <style>
      #lxp-loader {
        position: fixed; inset: 0; z-index: 9999;
        background: #080810;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 28px;
        transition: transform 0.4s ease-in;
      }
      #lxp-loader.lxp-exit { transform: translateY(-100%); }
      #lxp-title {
        display: flex;
        font-family: 'Press Start 2P', monospace;
        font-size: clamp(22px, 5vw, 50px);
        color: #f5a623;
        letter-spacing: 0.05em;
      }
      #lxp-title span {
        display: inline-block;
        opacity: 0;
        transform: translateY(-36px);
        transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      }
      #lxp-title span.lxp-v { opacity: 1; transform: translateY(0); }
      #lxp-bar-track {
        width: min(300px, 80vw); height: 2px;
        background: #1e1e38;
      }
      #lxp-bar {
        height: 100%; width: 0%;
        background: #f5a623;
        box-shadow: 0 0 8px #f5a623;
        transition: width 1.8s cubic-bezier(0.4,0,0.2,1);
      }
      #lxp-sub {
        font-family: 'DM Mono', 'Courier New', monospace;
        font-size: 11px; color: #6b6b8a; letter-spacing: 0.15em;
      }
      .lxp-blink { animation: lxp-blink 0.8s step-end infinite; }
      @keyframes lxp-blink { 50% { opacity: 0; } }
    </style>
  </head>
  <body>
    <!-- Loader lives outside #root — React never touches it -->
    <div id="lxp-loader" aria-hidden="true">
      <div id="lxp-title">
        <span>Y</span><span>o</span><span>u</span><span>X</span><span>P</span>
      </div>
      <div id="lxp-bar-track"><div id="lxp-bar"></div></div>
      <div id="lxp-sub">LOADING SYSTEM...<span class="lxp-blink">_</span></div>
    </div>

    <div id="root"></div>
    <script src="/loader.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
