<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0F1E"/>
      <stop offset="100%" stop-color="#161828"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Accent border ring -->
  <rect width="100" height="100" rx="20" fill="none"
    stroke="#E94560" stroke-width="3" opacity="0.6" filter="url(#glow)"/>

  <!-- Lightning bolt — the XP mark -->
  <path d="M60 12 L36 52 H53 L40 88 L64 48 H47 Z"
    fill="#E94560" filter="url(#glow)"/>

  <!-- Subtle inner highlight on bolt -->
  <path d="M56 18 L38 52 H52 L42 78"
    fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
</svg>
